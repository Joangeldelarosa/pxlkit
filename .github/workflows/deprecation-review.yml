name: Deprecation Review

on:
  schedule:
    # First Monday of each month at 09:00 UTC
    - cron: '0 9 1-7 * 1'
  workflow_dispatch:

jobs:
  review:
    name: Monthly deprecation lifecycle audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run deprecated-lifecycle gate (standalone)
        id: gate
        run: |
          npx tsx -e "
            import { runAudit } from './scripts/audit-coherence/run.ts';
            const r = await runAudit({ repoRoot: process.cwd(), writeReport: false });
            const dep = r.gates.find(g => g.id === 'deprecated-lifecycle');
            if (!dep) { console.log('Gate not registered yet'); process.exit(0); }
            console.log(JSON.stringify(dep, null, 2));
            if (!dep.ok) process.exit(2);
          "
        continue-on-error: true

      - name: Open issue if deprecation policy violations found
        if: steps.gate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Monthly deprecation review: lifecycle violations (${new Date().toISOString().slice(0,10)})`,
              labels: ['deprecation', 'governance'],
              body: 'The monthly deprecation review found one or more components whose lifecycle stage has expired (e.g. removal due, but still exported). See workflow logs and `docs/governance/DEPRECATION_POLICY.md`.',
            });
