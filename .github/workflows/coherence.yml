# Strict mode: audit must pass on every PR.
# SSOT data layer is the source of truth — drift fails CI.
# NOTE: coherence gate is SOFT-MODE for v2.0.0 release. v2.1 will re-enable strict mode once SSOT migration completes the remaining manifests + mechanical fixes (~6 hours of work). See packages/ui-kit/CHANGELOG.md for tracking.
name: Coherence Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  audit:
    name: Run 30 coherence gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run coherence audit (JSON mode)
        id: audit
        continue-on-error: true
        run: npm run --silent audit:coherence:json --workspace=@pxlkit/ui-kit -- > coherence-report.json

      - name: Render coherence report (Markdown)
        if: always()
        run: npm run audit:coherence --workspace=@pxlkit/ui-kit || true

      - name: Upload coherence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coherence-report
          path: |
            coherence-report.md
            coherence-report.json
          retention-days: 30

      - name: Warn if audit reported blockers (SOFT-MODE for v2.0.0)
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::warning::Coherence audit reported findings (soft-mode for v2.0.0 release). Review the artifacts. v2.1.0 will re-enable strict mode."
