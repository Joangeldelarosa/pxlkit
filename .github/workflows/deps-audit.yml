name: Dependencies Audit

on:
  schedule:
    # Daily 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  audit:
    name: npm audit + outdated check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+critical only, json)
        id: audit
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: npm outdated (json, never fails)
        run: |
          set +e
          npm outdated --json > npm-outdated.json
          exit 0

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deps-audit-${{ github.run_number }}
          path: |
            npm-audit.json
            npm-outdated.json
          retention-days: 30

      - name: Open issue on high/critical vulnerabilities
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'Daily `npm audit` found high or critical vulnerabilities.\n\n';
            try {
              const data = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
              body += '```json\n' + JSON.stringify(data.metadata?.vulnerabilities ?? data, null, 2).slice(0, 50000) + '\n```';
            } catch (e) {
              body += '_(audit output unavailable — see workflow run artifacts)_';
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Dependency vulnerabilities detected (${new Date().toISOString().slice(0,10)})`,
              labels: ['security', 'dependencies'],
              body,
            });
