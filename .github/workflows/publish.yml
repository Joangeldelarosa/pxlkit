name: Publish to npm

on:
  push:
    branches: [main]
    tags:
      - "v*"
  release:
    types: [published]

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Validate icons
        run: node validate-icons.js

      - name: Detect changed packages and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGES=(
            "packages/core"
            "packages/gamification"
            "packages/feedback"
            "packages/social"
            "packages/weather"
            "packages/ui"
            "packages/effects"
            "packages/ui-kit"
          )

          published=0
          skipped=0
          failed=0

          for pkg in "${PACKAGES[@]}"; do
            name=$(node -p "require('./$pkg/package.json').name")
            local_version=$(node -p "require('./$pkg/package.json').version")
            npm_version=$(npm view "$name" version 2>/dev/null || echo "0.0.0")

            if [ "$local_version" = "$npm_version" ]; then
              echo "⏭️  $name@$local_version — already on npm, skipping"
              skipped=$((skipped + 1))
            else
              echo "📦 $name@$local_version — new version (npm has $npm_version), publishing..."
              if npm publish --workspace="$pkg" --provenance --access public; then
                echo "✅ $name@$local_version published successfully"
                published=$((published + 1))
              else
                echo "❌ $name@$local_version failed to publish"
                failed=$((failed + 1))
              fi
            fi
          done

          echo ""
          echo "📊 Summary: $published published, $skipped skipped, $failed failed"

          if [ "$failed" -gt 0 ]; then
            echo "::warning::$failed package(s) failed to publish"
          fi
