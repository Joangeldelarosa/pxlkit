name: Publish to npm

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Validate icons
        run: node validate-icons.js

      # Publish @pxlkit/core first — other packages depend on it
      - name: Publish @pxlkit/core
        run: npm publish --workspace=packages/core --provenance --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pxlkit/gamification
        run: npm publish --workspace=packages/gamification --provenance --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pxlkit/feedback
        run: npm publish --workspace=packages/feedback --provenance --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pxlkit/social
        run: npm publish --workspace=packages/social --provenance --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pxlkit/weather
        run: npm publish --workspace=packages/weather --provenance --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pxlkit/ui
        run: npm publish --workspace=packages/ui --provenance --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pxlkit/effects
        run: npm publish --workspace=packages/effects --provenance --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pxlkit/ui-kit
        run: npm publish --workspace=packages/ui-kit --provenance --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
